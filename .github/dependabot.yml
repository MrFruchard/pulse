version: 2

updates:
  # Backend — Go modules
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - "infra"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Frontend — npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - "infra"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - "infra"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - "infra"
    commit-message:
      prefix: "chore(deps)"
