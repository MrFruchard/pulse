
<div id="mld" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#dbeafe',
    primaryTextColor: dark ? '#93c5fd' : '#1e40af',
    primaryBorderColor: dark ? '#3b82f6' : '#93c5fd',
  },
});
const diagram = `erDiagram
  users {
    uuid id PK
    varchar_255 email UK
    varchar_255 password_hash
    varchar_50 pseudo UK
    varchar_500 avatar_url
    text bio
    enum_role role "user|moderator|admin"
    integer streak "DEFAULT 0"
    enum_status status "active|dormant|suspended"
    timestamp created_at
    timestamp updated_at
  }
  sessions {
    uuid id PK
    timestamp opens_at
    timestamp closes_at
    boolean is_active "DEFAULT false"
    timestamp created_at
  }
  posts {
    uuid id PK
    uuid user_id FK
    uuid session_id FK
    text content
    enum_intention intention "QUESTION|SHARE|PROJECT|CHALLENGE"
    varchar_500 image_url
    boolean is_flagged "DEFAULT false"
    timestamp created_at
  }
  comments {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    text content
    timestamp created_at
  }
  reactions {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    enum_type type "LIKE|FIRE|INSIGHTFUL|SUPPORT"
    timestamp created_at
  }
  follows {
    uuid id PK
    uuid follower_id FK
    uuid following_id FK
    timestamp created_at
  }
  notifications {
    uuid id PK
    uuid user_id FK
    enum_notif type
    jsonb payload
    boolean is_read "DEFAULT false"
    timestamp created_at
  }
  reports {
    uuid id PK
    uuid post_id FK
    uuid reporter_id FK
    enum_reason reason
    enum_rstat status "PENDING|REVIEWED|DISMISSED"
    timestamp created_at
  }
  session_attendances {
    uuid id PK
    uuid user_id FK
    uuid session_id FK
    timestamp joined_at
  }
  users ||--o{ posts : "user_id"
  sessions ||--o{ posts : "session_id"
  posts ||--o{ comments : "post_id"
  users ||--o{ comments : "user_id"
  posts ||--o{ reactions : "post_id"
  users ||--o{ reactions : "user_id"
  users ||--o{ follows : "follower_id"
  users ||--o{ follows : "following_id"
  users ||--o{ notifications : "user_id"
  posts ||--o{ reports : "post_id"
  users ||--o{ reports : "reporter_id"
  users ||--o{ session_attendances : "user_id"
  sessions ||--o{ session_attendances : "session_id"
`;
const { svg } = await mermaid.render('mld-svg', diagram);
document.getElementById('mld').innerHTML = svg;
document.querySelectorAll('#mld svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#mld svg.erDiagram .row-rect-odd path, #mld svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
