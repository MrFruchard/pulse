
<div id="mcd" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#dbeafe',
    primaryTextColor: dark ? '#93c5fd' : '#1e40af',
    primaryBorderColor: dark ? '#3b82f6' : '#93c5fd',
  },
});
const diagram = `erDiagram
  USER {
    uuid id PK
    varchar email UK
    varchar pseudo UK
    enum role
    integer streak
    enum status
    timestamp created_at
  }
  SESSION {
    uuid id PK
    timestamp opens_at
    timestamp closes_at
    boolean is_active
  }
  POST {
    uuid id PK
    uuid user_id FK
    uuid session_id FK
    text content
    enum intention
    boolean is_flagged
    timestamp created_at
  }
  COMMENT {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    text content
    timestamp created_at
  }
  REACTION {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    enum type
    timestamp created_at
  }
  FOLLOW {
    uuid id PK
    uuid follower_id FK
    uuid following_id FK
    timestamp created_at
  }
  NOTIFICATION {
    uuid id PK
    uuid user_id FK
    enum type
    jsonb payload
    boolean is_read
    timestamp created_at
  }
  REPORT {
    uuid id PK
    uuid post_id FK
    uuid reporter_id FK
    enum reason
    enum status
    timestamp created_at
  }
  SESSION_ATTENDANCE {
    uuid id PK
    uuid user_id FK
    uuid session_id FK
    timestamp joined_at
  }
  USER ||--o{ POST : "redige"
  SESSION ||--o{ POST : "contient"
  POST ||--o{ COMMENT : "recoit"
  USER ||--o{ COMMENT : "ecrit"
  POST ||--o{ REACTION : "recoit"
  USER ||--o{ REACTION : "fait"
  USER ||--o{ FOLLOW : "follower"
  USER ||--o{ FOLLOW : "following"
  USER ||--o{ NOTIFICATION : "recoit"
  POST ||--o{ REPORT : "signale"
  USER ||--o{ REPORT : "reporter"
  USER ||--o{ SESSION_ATTENDANCE : "assiste"
  SESSION ||--o{ SESSION_ATTENDANCE : "enregistre"
`;
const { svg } = await mermaid.render('mcd-svg', diagram);
document.getElementById('mcd').innerHTML = svg;
document.querySelectorAll('#mcd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#mcd svg.erDiagram .row-rect-odd path, #mcd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
